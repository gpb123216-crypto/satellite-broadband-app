workflows:
  android-workflow:
    name: Satellite Broadband Build
    max_build_duration: 60
    environment:
      java: 17

    scripts:
      - name: Grant permission
        script: chmod +x ./gradlew

      - name: Build Debug APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk
